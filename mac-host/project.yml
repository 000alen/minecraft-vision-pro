name: VisionCraftHost

# Declarative project spec consumed by XcodeGen (https://github.com/yonaskolb/XcodeGen).
# The `.xcodeproj` is a generated build artifact (git-ignored) — never edit it by hand.
# Regenerate after adding/removing files:  xcodegen generate   (or ../scripts/gen-projects.sh)

options:
  bundleIdPrefix: visioncraft
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  defaultConfig: Release

settings:
  base:
    SWIFT_VERSION: "5.0"

targets:
  VisionCraftHost:
    type: application
    platform: macOS
    sources:
      - path: Sources
      # Code shared with the Java bridge and ALVR adapter.
      - path: ../shared/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: visioncraft.host
        PRODUCT_NAME: $(TARGET_NAME)
        GENERATE_INFOPLIST_FILE: "YES"
        ENABLE_HARDENED_RUNTIME: "YES"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: $(VISIONCRAFT_DEVELOPMENT_TEAM)
        SWIFT_EMIT_LOC_STRINGS: "YES"
        SWIFT_OBJC_BRIDGING_HEADER: Sources/VisionCraftHost-Bridging-Header.h
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/Sources
          - $(SRCROOT)/Vendor/ALVRServerCore
        LIBRARY_SEARCH_PATHS:
          - $(inherited)
          - $(SRCROOT)/Vendor/ALVRServerCore
        OTHER_LDFLAGS:
          - $(inherited)
          - -lalvr_server_core
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/../Frameworks"
    preBuildScripts:
      - name: Prepare ALVR Artifacts
        script: |
          "$SRCROOT/../scripts/prepare-alvr.sh"
    postBuildScripts:
      - name: Embed ALVR server_core
        script: |
          set -euo pipefail
          mkdir -p "$TARGET_BUILD_DIR/$FRAMEWORKS_FOLDER_PATH"
          cp "$SRCROOT/Vendor/ALVRServerCore/libalvr_server_core.dylib" \
            "$TARGET_BUILD_DIR/$FRAMEWORKS_FOLDER_PATH/libalvr_server_core.dylib"
          dylib="$TARGET_BUILD_DIR/$FRAMEWORKS_FOLDER_PATH/libalvr_server_core.dylib"
          if [[ "${CODE_SIGNING_ALLOWED:-YES}" != "NO" && -n "${EXPANDED_CODE_SIGN_IDENTITY:-}" ]]; then
            codesign --force --sign "$EXPANDED_CODE_SIGN_IDENTITY" "$dylib"
          else
            codesign --force --sign - "$dylib" >/dev/null 2>&1 || true
          fi

schemes:
  VisionCraftHost:
    build:
      targets:
        VisionCraftHost: all
    run:
      config: Debug
    profile:
      config: Release
    archive:
      config: Release
