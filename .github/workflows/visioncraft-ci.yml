name: VisionCraft CI

on:
  push:
    branches: [main, 'cursor/**']
  pull_request:
    branches: [main]

jobs:
  bridge-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run bridge unit tests
        run: ./gradlew test --no-daemon

      - name: Build bridge JAR
        run: ./gradlew :bridge-lib:jar :bridge-test:classes --no-daemon
