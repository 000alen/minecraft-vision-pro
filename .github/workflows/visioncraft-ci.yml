name: VisionCraft CI

on:
  push:
    branches: [main, 'cursor/**']
  pull_request:
    branches: [main]

jobs:
  prepare-alvr-source:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify vendored ALVR tree (monorepo)
        run: ./scripts/prepare-alvr.sh --check-source

  bridge-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run bridge unit + integration tests
        run: ./gradlew test --no-daemon

      - name: Build bridge artifacts
        run: ./gradlew :bridge-lib:jar :bridge-mock-host:jar :bridge-test:classes --no-daemon
